<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ATTACK OF THE TURDVADERS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
:root{--cyan:#00ffff;--pink:#ff00aa;--yellow:#ffee00;--bg:#0d1b3e;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#0d1b3e;overflow:hidden;touch-action:none;user-select:none;font-family:'Press Start 2P','Courier New',monospace;}
#wrap{display:flex;flex-direction:column;align-items:center;width:100%;height:100%;}
#hud{display:flex;justify-content:space-between;width:100%;max-width:600px;padding:6px 10px 4px;font-size:8px;color:var(--cyan);flex-shrink:0;letter-spacing:1px;}
#hud .val{color:var(--yellow);}
#lives-val{color:var(--pink);}
#canvas-wrap{position:relative;flex:1;width:100%;max-width:600px;min-height:0;}
#game{display:block;width:100%;height:100%;border-left:1px solid rgba(0,255,255,0.15);border-right:1px solid rgba(0,255,255,0.15);}
#touch-hints{position:absolute;bottom:0;left:0;right:0;height:64px;display:flex;pointer-events:none;z-index:5;}
.th{flex:1;display:flex;align-items:center;justify-content:center;font-size:7px;letter-spacing:1px;opacity:0.18;border-top:1px solid currentColor;}
.th-left{color:var(--cyan);border-right:1px solid rgba(0,255,255,0.12);}
.th-right{color:var(--cyan);border-left:1px solid rgba(0,255,255,0.12);}
.th-fire{color:#ff8800;}
.th.active{opacity:0.55;background:rgba(255,255,255,0.05);}
#ctrl-bar{font-size:6px;color:rgba(0,255,255,0.3);padding:3px 0 2px;flex-shrink:0;letter-spacing:1px;}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,8,28,0.93);z-index:20;gap:14px;padding:16px 12px;}
#overlay.hidden{display:none;}
#overlay h2{font-size:clamp(14px,4vw,24px);text-align:center;line-height:1.7;}
#logo-wrap{width:100%;display:flex;justify-content:center;margin-bottom:2px;}
#logo-canvas{max-width:100%;image-rendering:pixelated;}
#ov-instructions{display:flex;flex-direction:column;gap:7px;width:100%;max-width:340px;}
.inst-line{font-size:clamp(8px,2.2vw,11px);color:rgba(0,255,255,0.85);letter-spacing:0.5px;text-align:left;padding-left:4px;}
.inst-sub{font-size:clamp(7px,1.8vw,9px);color:rgba(255,200,80,0.75);text-align:center;margin-top:4px;letter-spacing:1px;}
.ov-score{font-size:11px;color:var(--yellow);}
.btn{font-family:'Press Start 2P','Courier New',monospace;font-size:clamp(9px,2.5vw,12px);padding:13px 28px;background:transparent;border:2px solid var(--cyan);color:var(--cyan);cursor:pointer;letter-spacing:2px;margin-top:4px;}
#banner{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:clamp(11px,3vw,20px);text-align:center;padding:12px 24px;border:2px solid;z-index:15;pointer-events:none;transition:transform 0.22s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap;font-family:'Press Start 2P','Courier New',monospace;}
#banner.show{transform:translate(-50%,-50%) scale(1);}
#banner.panic{color:var(--pink);border-color:var(--pink);background:rgba(20,0,10,0.94);}
#banner.normal{color:var(--cyan);border-color:var(--cyan);background:rgba(0,10,20,0.94);}

#health-wrap{
  width:100%;max-width:600px;padding:2px 10px 4px;
  display:flex;align-items:center;gap:8px;flex-shrink:0;
}
#health-label{font-size:7px;color:#ff4466;letter-spacing:1px;white-space:nowrap;}
#health-bar-bg{
  flex:1;height:10px;
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,80,100,0.4);
  border-radius:5px;overflow:hidden;
}
#health-bar{
  height:100%;width:100%;
  background:linear-gradient(90deg,#ff2244,#ff6644);
  border-radius:5px;
  transition:width 0.2s ease, background 0.3s ease;
}
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <span>SCR:<span class="val" id="h-score">0</span></span>
    <span>LVL:<span class="val" id="h-level">1</span></span>
    <span id="lives-val">&#9829;&#9829;&#9829;</span>
    <span>HI:<span class="val" id="h-hi">0</span></span>
    <span id="mute-btn" onclick="toggleMute()" style="cursor:pointer;color:rgba(0,255,255,0.6);font-size:8px;">&#9834;</span>
  </div>
  <div id="health-wrap">
    <span id="health-label">HP</span>
    <div id="health-bar-bg"><div id="health-bar"></div></div>
  </div>
  <div id="canvas-wrap">
    <canvas id="game"></canvas>
    <div id="touch-hints">
      <div class="th th-left" id="th-l">&#9668; MOVE</div>
      <div class="th th-fire" id="th-f">&#9679; FIRE</div>
      <div class="th th-right" id="th-r">MOVE &#9658;</div>
    </div>
    <div id="banner"></div>
    <div id="panic-img-wrap" style="display:none;position:absolute;top:0;left:0;right:0;bottom:0;align-items:center;justify-content:center;z-index:16;pointer-events:none;">
      <canvas id="panic-img-canvas"></canvas>
    </div>
    <div id="overlay">
      <div id="logo-wrap">
        <canvas id="logo-canvas"></canvas>
      </div>
      <div id="ov-instructions">
        <p class="inst-line">&#9654; HOLD LEFT &mdash; MOVE LEFT</p>
        <p class="inst-line">&#9654; HOLD RIGHT &mdash; MOVE RIGHT</p>
        <p class="inst-line">&#9654; HOLD CENTER &mdash; FIRE</p>
        <p class="inst-line">&#9654; KEYBOARD: &larr; &rarr; SPACE</p>
        <p class="inst-sub">SHOOT THE INVADERS &bull; SURVIVE THE BOSS!</p>
      </div>
      <button class="btn" id="btn-start">&#9654; START GAME</button>
    </div>
  </div>
  <div id="ctrl-bar">HOLD LEFT &middot; CENTER FIRE &middot; RIGHT &mdash; KEYBOARD: &larr; &rarr; SPACE</div>
</div>

// ── Sprite images ─────────────────────────────────────────
var I = {};
function loadImg(key, b64) {
  var img = new Image();
  img.onload  = function(){ img._ready=true; };
  img.onerror = function(){ console.warn("Failed to load sprite: "+key); };
  img.src = "data:image/png;base64," + b64;
  I[key] = img;
}
function safeDrawImage(img, x, y, w, h){
  // Prevent drawImage runtime errors while embedded sprites are still loading.
  if(img && img._ready && img.naturalWidth > 0){
    ctx.drawImage(img, x, y, w, h);
    return true;
  }
  return false;
}

// ── Canvas ────────────────────────────────────────────────
var canvas = document.getElementById("game");
var ctx    = canvas.getContext("2d");
var W=360, H=480, cachedRect=null;

function resize() {
  var wrap = document.getElementById("canvas-wrap");
  // Guard against a transient zero-height layout on mobile browsers.
  W = Math.max(240, wrap.clientWidth || 360);
  H = Math.max(320, wrap.clientHeight || 480);
  canvas.width = W;
  canvas.height = H;
  cachedRect = null;
  buildStarBg();
  buildStarLayer();
}
var resizeTmr=null;
window.addEventListener("resize",function(){
  clearTimeout(resizeTmr);
  resizeTmr=setTimeout(resize,150);
});

var starBg=null;
function buildStarBg(){
  starBg=document.createElement("canvas");
  starBg.width=W; starBg.height=H;
  var sc=starBg.getContext("2d");

  // Sky gradient — deep navy top to midnight blue bottom
  var grad=sc.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,"#0a1628");
  grad.addColorStop(0.4,"#0d2044");
  grad.addColorStop(1,"#1a1040");
  sc.fillStyle=grad;
  sc.fillRect(0,0,W,H);

  // Nebula clouds — soft blobs of color
  var nebulas=[
    {x:W*0.2, y:H*0.15, r:W*0.28, c:"rgba(80,40,160,0.18)"},
    {x:W*0.75,y:H*0.35, r:W*0.22, c:"rgba(30,80,180,0.15)"},
    {x:W*0.5, y:H*0.65, r:W*0.32, c:"rgba(100,20,120,0.12)"},
    {x:W*0.1, y:H*0.7,  r:W*0.2,  c:"rgba(20,100,160,0.1)"},
  ];
  for(var ni=0;ni<nebulas.length;ni++){
    var nb=nebulas[ni];
    var ng=sc.createRadialGradient(nb.x,nb.y,0,nb.x,nb.y,nb.r);
    ng.addColorStop(0,nb.c);
    ng.addColorStop(1,"rgba(0,0,0,0)");
    sc.fillStyle=ng;
    sc.fillRect(0,0,W,H);
  }

  // Static background stars — small, dimmer
  for(var i=0;i<120;i++){
    var sx=Math.random()*W, sy=Math.random()*H;
    var sr=Math.random()*1.0+0.2, sa=Math.random()*0.5+0.15;
    sc.fillStyle="rgba(200,220,255,"+sa+")";
    sc.beginPath(); sc.arc(sx,sy,sr,0,Math.PI*2); sc.fill();
  }
}

var starLayer=[];
// 3 parallax layers: far (slow,small,dim), mid, near (fast,big,bright)
var starLayers3=[];
function buildStarLayer(){
  starLayers3=[];
  // Far layer
  for(var i=0;i<40;i++)
    starLayers3.push({x:Math.random()*W,y:Math.random()*H,
      r:0.5,spd:0.06,a:0.25,layer:0});
  // Mid layer
  for(var i=0;i<30;i++)
    starLayers3.push({x:Math.random()*W,y:Math.random()*H,
      r:0.9,spd:0.18,a:0.45,layer:1});
  // Near layer — larger, brighter, faster
  for(var i=0;i<15;i++)
    starLayers3.push({x:Math.random()*W,y:Math.random()*H,
      r:1.6,spd:0.45,a:0.75,layer:2});
}

});

// ── Touch ─────────────────────────────────────────────────
var tZones={},tLeft=false,tFire=false,tRight=false;
function getRect(){if(!cachedRect) cachedRect=canvas.getBoundingClientRect(); return cachedRect;}
window.addEventListener("resize",function(){cachedRect=null;});
function zoneOf(cx){var r=getRect(),rx=(cx-r.left)/r.width; return rx<0.33?"L":rx<0.67?"C":"R";}
function syncZones(){
  tLeft=false;tFire=false;tRight=false;
  for(var k in tZones){if(tZones[k]==="L")tLeft=true;if(tZones[k]==="C")tFire=true;if(tZones[k]==="R")tRight=true;}
  document.getElementById("th-l").className="th th-left"+(tLeft?" active":"");
  document.getElementById("th-f").className="th th-fire"+(tFire?" active":"");
  document.getElementById("th-r").className="th th-right"+(tRight?" active":"");
}
function onTS(e){
  e.preventDefault(); cachedRect=canvas.getBoundingClientRect();
  for(var i=0;i<e.changedTouches.length;i++) tZones[e.changedTouches[i].identifier]=zoneOf(e.changedTouches[i].clientX);
  syncZones();
}
function onTE(e){
  e.preventDefault();
  for(var i=0;i<e.changedTouches.length;i++) delete tZones[e.changedTouches[i].identifier];
  syncZones();
}
function clearT(){tZones={};tLeft=false;tFire=false;tRight=false;syncZones();}
var paused=false;
document.addEventListener("visibilitychange",function(){
  paused=document.hidden;
  if(paused) clearT();
});
canvas.addEventListener("touchstart",onTS,{passive:false});
canvas.addEventListener("touchend",  onTE,{passive:false});
canvas.addEventListener("touchcancel",onTE,{passive:false});
canvas.addEventListener("touchmove", function(e){
  e.preventDefault();
  cachedRect=canvas.getBoundingClientRect();
  for(var i=0;i<e.changedTouches.length;i++) tZones[e.changedTouches[i].identifier]=zoneOf(e.changedTouches[i].clientX);
  syncZones();
},{passive:false});
window.addEventListener("blur",clearT);

// ── HUD ───────────────────────────────────────────────────
function updateHUD(){
  document.getElementById("h-score").textContent=S.score;
  document.getElementById("h-level").textContent=S.level;
  document.getElementById("h-hi").textContent=S.hi;
  // Health bar
  var pct=Math.max(0,Math.min(100, (S.hp/S.maxHp)*100));
  var bar=document.getElementById("health-bar");
  if(bar){
    bar.style.width=pct+"%";
    if(pct>60)      bar.style.background="linear-gradient(90deg,#22cc44,#44ff66)";
    else if(pct>30) bar.style.background="linear-gradient(90deg,#ffaa00,#ffdd00)";
    else            bar.style.background="linear-gradient(90deg,#ff2244,#ff6644)";
  }
  // Hearts show remaining hits. At 0 HP, show no filled hearts.
  var h="";
  for(var i=0;i<Math.max(0,Math.ceil(S.hp/34));i++) h+="\u2665";
  document.getElementById("lives-val").textContent=h;
}

var bannerTmr=0;
function showBanner(txt,type){
  var el=document.getElementById("banner");
  el.textContent=txt; el.className="show "+type; bannerTmr=130;
}

function burst(x,y,color,n){
  for(var i=0;i<n;i++){
    var a=Math.random()*Math.PI*2,sp=Math.random()*3+0.8;
    particles.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      color:color,r:Math.random()*3+1.5,life:35,max:35});
  }
}

// ── Spawn ─────────────────────────────────────────────────
function initPlayer(){player={x:W/2,y:H-52,w:34,h:26,cooldown:0,iframes:0};}

function spawnWave(){
  enemies=[]; hitFlash={}; powerups=[]; killCount=0; shieldActive=false; rapidFireActive=false;
  if(activePowerup){clearTimeout(activePowerup);activePowerup=null;}
  var cols=Math.min(9,6+S.level);
  var rows=Math.min(5,3+Math.floor(S.level/2));
  var sx=(W-30)/cols;

  for(var r=0;r<rows;r++){
    // Row 0 = bald (top, worth most)
    // Row 1 = curly (middle)
    // Rows 2+ = dark hair (bottom, worth least)
    var type = r===0 ? "bald" : r===1 ? "curly" : "dark";
    var pts  = r===0 ? 30    : r===1 ? 20      : 10;
    for(var c=0;c<cols;c++){
      enemies.push({
        x:15+c*sx+sx/2, y:48+r*36,
        w:26, h:20,
        type:type, pts:pts,
        alive:true, af:Math.floor(Math.random()*60),
        shootP:0.00025+S.level*0.00008
      });
    }
  }
  eDir=1; eSpd=0.4+S.level*0.12; eMvTmr=0;
  pBullets=[]; eBullets=[];
}

function spawnBoss(){
  boss={x:W/2,y:-90,
    w:Math.min(150,W*0.42),h:Math.min(160,W*0.45),
    af:0,phase:"enter",bombTmr:0,bombRate:65};
  bombs=[]; eBullets=[];
}

// ── Flow ──────────────────────────────────────────────────
function startGame(){
  document.getElementById("overlay").classList.add("hidden");
  document.getElementById("banner").className = "";
  hidePanicImage();

  S.score=0;S.level=1;S.lives=3;S.hp=100;S.playTimer=0;S.panicTimer=0;S.mode="play";

  // Full state reset. Without this, retrying after a boss death can leave stale
  // boss/bomb objects visible or active in the next run.
  boss=null;
  enemies=[];
  pBullets=[];
  eBullets=[];
  bombs=[];
  particles=[];

  resetPowerupState();
  musicPlay();
  initPlayer(); spawnWave(); updateHUD();
}
function nextWave(){
  S.level++; S.score+=200;
  S.playTimer=0;
  spawnWave();
  showBanner("\u25BA WAVE "+S.level+" \u25C4","normal");
  updateHUD();
}
function showPanicImage(){
  var wrap = document.getElementById("panic-img-wrap");
  var pc   = document.getElementById("panic-img-canvas");
  if(!wrap || !pc || !I.panicBanner || !I.panicBanner._ready) return;
  var img = I.panicBanner;
  var maxW = Math.min(W * 0.85, 260);
  var scale = maxW / img.naturalWidth;
  pc.width  = Math.round(img.naturalWidth  * scale);
  pc.height = Math.round(img.naturalHeight * scale);
  pc.style.width  = pc.width  + "px";
  pc.style.height = pc.height + "px";
  var pctx = pc.getContext("2d");
  pctx.clearRect(0,0,pc.width,pc.height);
  pctx.drawImage(img,0,0,pc.width,pc.height);
  wrap.style.display = "flex";
  // Auto-hide after 2.5s
  setTimeout(function(){ hidePanicImage(); }, 2500);
}

function hidePanicImage(){
  var wrap = document.getElementById("panic-img-wrap");
  if(wrap) wrap.style.display = "none";
}

function enterPanic(){
  S.mode="panic";S.panicTimer=0;
  enemies=[];pBullets=[];eBullets=[];powerups=[];
  spawnBoss();
  showPanicImage();
}
function exitPanic(){
  S.mode="play";S.playTimer=0;boss=null;bombs=[];
  hidePanicImage();
  S.score+=300;S.level++;spawnWave();
  showBanner("\u25BA WAVE "+S.level+" \u25C4","normal");
  updateHUD();
}
// ── Power-up helpers ─────────────────────────────────────────
var PU_TYPES  = ["medkit","rapid","shield"];
var PU_COLORS = {medkit:"#ff4466", rapid:"#ffee00", shield:"#44aaff"};
var PU_LABELS = {medkit:"+HP",     rapid:"ZAP",     shield:"SHLD"};
var PU_DESC   = {medkit:"RESTORE HEALTH", rapid:"RAPID FIRE x8s", shield:"BLOCK 1 HIT"};
var PU_WEIGHTS=[60, 25, 15]; // % chance for each type

function pickPUType(){
  var r=Math.random()*100, cum=0;
  for(var i=0;i<PU_TYPES.length;i++){
    cum+=PU_WEIGHTS[i];
    if(r<cum) return PU_TYPES[i];
  }
  return PU_TYPES[0];
}

function spawnPowerup(x,y){
  if(powerups.length>0) return; // only 1 on screen at a time
  powerups.push({
    x:x, y:y,
    type:pickPUType(),
    vy:2.2,           // faster fall
    life:420,         // ~7s at 60fps
    maxLife:420,
    angle:0,          // controlled spin angle
    bobAngle:Math.random()*Math.PI*2
  });
}

function collectPowerup(pu){
  if(pu.type==="medkit"){
    S.hp=Math.min(S.maxHp, S.hp+34);
    S.lives=Math.ceil(S.hp/34);
    updateHUD();
    burst(pu.x,pu.y,"#ff4466",16);
    showBanner("+34 HP","normal");
  } else if(pu.type==="rapid"){
    rapidFireActive=true;
    if(activePowerup) clearTimeout(activePowerup);
    activePowerup=setTimeout(function(){
      rapidFireActive=false; activePowerup=null;
    }, 8000);
    burst(pu.x,pu.y,"#ffee00",16);
    showBanner("RAPID FIRE!","normal");
  } else if(pu.type==="shield"){
    shieldActive=true;
    burst(pu.x,pu.y,"#44aaff",16);
    showBanner("SHIELD UP!","normal");
  }
}

function drawPowerup(pu){
  // Use pu.angle for smooth controlled spin (updated in update loop)
  var bob  = Math.sin(pu.bobAngle)*4;
  var fade = Math.min(1, pu.life/60);
  ctx.save();
  ctx.globalAlpha=fade;
  ctx.translate(pu.x, pu.y+bob);

  // Solid background circle
  ctx.fillStyle="rgba(0,0,0,0.55)";
  ctx.beginPath(); ctx.arc(0,0,18,0,Math.PI*2); ctx.fill();

  // Colored border ring
  ctx.strokeStyle=PU_COLORS[pu.type];
  ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(0,0,18,0,Math.PI*2); ctx.stroke();

  // Slow spinning inner ring (use pu.angle, not raw timestamp)
  ctx.save();
  ctx.rotate(pu.angle);
  ctx.strokeStyle=PU_COLORS[pu.type];
  ctx.globalAlpha=fade*0.4;
  ctx.lineWidth=2;
  ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.arc(0,0,13,0,Math.PI*2); ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
  ctx.globalAlpha=fade;

  // Short label inside (type indicator)
  ctx.fillStyle=PU_COLORS[pu.type];
  ctx.font="bold 9px 'Press Start 2P','Courier New',monospace";
  ctx.textAlign="center";
  ctx.textBaseline="middle";
  ctx.fillText(PU_LABELS[pu.type],0,0);

  // Full description below the circle
  ctx.font="7px 'Press Start 2P','Courier New',monospace";
  ctx.fillStyle="#ffffff";
  ctx.globalAlpha=fade*0.9;
  ctx.fillText(PU_DESC[pu.type],0,30);

  ctx.restore();
}

function resetPowerupState(){
  powerups=[];
  killCount=0;
  rapidFireActive=false;
  shieldActive=false;
  if(activePowerup){ clearTimeout(activePowerup); activePowerup=null; }
}

function loseLife(){
  if(shieldActive){
    shieldActive=false;
    burst(player.x,player.y,"#44aaff",20);
    showBanner("SHIELD BROKEN","panic");
    player.iframes=80;
    return;
  }
  S.hp -= 34;
  if(S.hp < 0) S.hp = 0;
  S.lives = Math.ceil(S.hp / 34);
  updateHUD();
  burst(player.x,player.y,"#ff4466",14);
  if(S.hp<=0){gameOver();return;}
  player.iframes=110;
}
function gameOver(){
  S.mode="gameover";
  hidePanicImage();
  musicStop();
  if(S.score>S.hi) S.hi=S.score;
  boss=null;
  enemies=[];
  pBullets=[]; eBullets=[]; bombs=[]; particles=[]; powerups=[];
  if(activePowerup){ clearTimeout(activePowerup); activePowerup=null; }
  rapidFireActive=false; shieldActive=false;
  updateHUD();
  var ov=document.getElementById("overlay");
  ov.innerHTML='<h2 style="color:#ff00aa">GAME<br>OVER</h2>'
    +'<div class="ov-score">SCORE: '+S.score+'</div>'
    +'<p style="color:#00ffff;font-size:9px">HIGH SCORE: '+S.hi+'</p>'
    +'<button class="btn" id="btn-retry">&#8635; RETRY</button>';
  ov.classList.remove("hidden");
  document.getElementById("btn-retry").addEventListener("click",startGame);
}

// ── Draw: Player ──────────────────────────────────────────
function drawPlayer(p){
  if(p.iframes>0&&Math.floor(Date.now()/70)%2===0) return;
  ctx.save(); ctx.translate(p.x,p.y);
  ctx.fillStyle=(Date.now()%200<100)?"#00ccff":"#ffffff";
  ctx.fillRect(-4,p.h*0.25,8,5);
  ctx.fillStyle="#008ecc";
  ctx.beginPath();
  ctx.moveTo(0,-p.h/2);ctx.lineTo(p.w/2,p.h/2);
  ctx.lineTo(p.w/4,p.h/4);ctx.lineTo(-p.w/4,p.h/4);
  ctx.lineTo(-p.w/2,p.h/2);ctx.closePath();ctx.fill();
  ctx.fillStyle="#55ddff";
  ctx.beginPath();
  ctx.moveTo(0,-p.h/2+3);ctx.lineTo(p.w/7,p.h/7);
  ctx.lineTo(-p.w/7,p.h/7);ctx.closePath();ctx.fill();
  ctx.fillStyle="#005577";
  ctx.fillRect(-p.w/2,p.h/6,p.w/4-1,4);
  ctx.fillRect(p.w/4+1,p.h/6,p.w/4-1,4);
  ctx.restore();
}

// ── Draw: Enemy ───────────────────────────────────────────
function drawEnemy(e,idx){
  var isHit=hitFlash[idx]>0;
  var calm, scream;
  if(e.type==="bald")       {calm=I.baldCalm;  scream=I.baldScream;}
  else if(e.type==="curly") {calm=I.curlyCalm; scream=I.curlyScream;}
  else                      {calm=I.darkCalm;  scream=I.darkScream;}
  var sprite=isHit?scream:calm;
  var dw=e.w*1.55, dh=e.h*1.9;
  ctx.save(); ctx.translate(e.x,e.y+Math.sin(e.af*0.1)*1.5);
  if(isHit){ctx.rotate((Math.floor(e.af)%2===0)?0.15:-0.15);ctx.globalAlpha=0.92;}
  if(!safeDrawImage(sprite,-dw/2,-dh/2,dw,dh)){
    // Fallback so the game can still run if a sprite fails to load.
    ctx.fillStyle=e.type==="bald"?"#44ff88":e.type==="curly"?"#ff44ff":"#ffcc00";
    ctx.fillRect(-e.w/2,-e.h/2,e.w,e.h);
    ctx.fillStyle="#001122";
    ctx.fillRect(-e.w/4,-3,3,3);
    ctx.fillRect(e.w/4,-3,3,3);
  }
  ctx.globalAlpha=1; ctx.restore();
}

// ── Draw: Boss ────────────────────────────────────────────
function drawBoss(b){
  var angry=b.phase==="angry";
  var pulse=1+Math.sin(b.af*0.06)*0.035;
  ctx.save(); ctx.translate(b.x,b.y); ctx.scale(pulse,pulse);
  if(!safeDrawImage(I.boss,-b.w/2,-b.h/2,b.w,b.h)){
    ctx.fillStyle="#ff00aa";
    ctx.beginPath();
    ctx.ellipse(0,0,b.w/2,b.h/2,0,0,Math.PI*2);
    ctx.fill();
  }
  if(angry){
    ctx.globalAlpha=0.28;
    ctx.fillStyle="#ff0000";
    ctx.beginPath();ctx.ellipse(0,0,b.w/2,b.h/2,0,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
  ctx.restore();
}

// ── Draw: Poop bomb ───────────────────────────────────────
function drawBomb(b){
  ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(b.rot||0);
  if(!safeDrawImage(I.poop,-29,-29,58,58)){
    ctx.fillStyle="#8b5a2b";
    ctx.beginPath();
    ctx.arc(0,0,14,0,Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

// ── Draw: Bullet ─────────────────────────────────────────
function drawBullet(b,isEnemy){
  ctx.fillStyle=b.color;
  if(isEnemy) ctx.fillRect(b.x-2,b.y,4,10);
  else        ctx.fillRect(b.x-2,b.y-9,4,10);
}

// ── Update ────────────────────────────────────────────────
var lastT=0;
function update(ts){
  if(paused){lastT=ts;return;}
  var dt=Math.min((ts-lastT)/16.67,3); lastT=ts;
  if(S.mode==="title"||S.mode==="gameover") return;

  if(bannerTmr>0){bannerTmr-=dt; if(bannerTmr<=0) document.getElementById("banner").className="";}

  var pSpd=S.mode==="panic"?2.2:1.0;
  for(var si=0;si<starLayers3.length;si++){
    var st=starLayers3[si];
    // Each layer scrolls at its own speed — true parallax
    var layerMult=(st.layer===0?1.0:st.layer===1?2.0:3.5);
    st.y+=st.spd*dt*pSpd*layerMult;
    if(st.y>H){st.y=-2;st.x=Math.random()*W;}
  }

  var goL=keys["ArrowLeft"]||keys["KeyA"]||tLeft;
  var goR=keys["ArrowRight"]||keys["KeyD"]||tRight;
  var fire=keys["Space"]||tFire;

  if(goL) player.x-=4.5*dt;
  if(goR) player.x+=4.5*dt;
  player.x=Math.max(player.w/2,Math.min(W-player.w/2,player.x));
  if(player.iframes>0) player.iframes-=dt;

  if(fire&&player.cooldown<=0){
    pBullets.push({x:player.x,y:player.y-player.h/2,vy:-11,color:rapidFireActive?"#ffee00":"#00ffff"});
    player.cooldown=rapidFireActive?5:11;
  }
  if(player.cooldown>0) player.cooldown-=dt;

  if(S.mode==="play"){
    S.playTimer+=dt;
    for(var ei=0;ei<enemies.length;ei++){
      enemies[ei].af+=dt;
      if(hitFlash[ei]>0) hitFlash[ei]-=dt;
    }
    var alive=[];
    for(var ei=0;ei<enemies.length;ei++) if(enemies[ei].alive) alive.push(enemies[ei]);
    if(alive.length===0){nextWave();return;}

    eMvTmr+=dt;
    var mvInt=Math.max(3,18-alive.length*0.25-S.level*0.8);
    if(eMvTmr>=mvInt){
      eMvTmr=0; var edge=false;
      for(var ei=0;ei<alive.length;ei++){
        alive[ei].x+=eDir*eSpd*mvInt*0.55;
        if(alive[ei].x<16||alive[ei].x>W-16) edge=true;
      }
      if(edge){eDir*=-1; for(var ei=0;ei<alive.length;ei++) alive[ei].y+=10;}
    }
    for(var ei=0;ei<alive.length;ei++){
      var e=alive[ei];
      if(Math.random()<e.shootP*dt){
        var col=e.type==="bald"?"#44ff88":e.type==="curly"?"#ff44ff":"#ffcc00";
        eBullets.push({x:e.x,y:e.y+e.h/2,vy:2.8+S.level*0.25,color:col});
      }
      if(e.y+e.h/2>H-40){loseLife();if(S.mode!=="gameover")spawnWave();return;}
    }
    if(S.playTimer>=S.PLAY_FRAMES){enterPanic();return;}
  }

  if(S.mode==="panic"&&boss){
    S.panicTimer+=dt; boss.af+=dt;
    if(boss.y<boss.h/2+10) boss.y+=2.5*dt;
    else boss.phase=S.panicTimer>S.PANIC_FRAMES*0.55?"angry":"chase";
    var bSpd=boss.phase==="angry"?1.8:1.1;
    var tx=player.x+(Math.random()-0.5)*50;
    boss.x+=(tx-boss.x)*0.018*bSpd*dt;
    boss.x=Math.max(boss.w/2,Math.min(W-boss.w/2,boss.x));
    boss.bombRate=boss.phase==="angry"?30:60;
    boss.bombTmr+=dt;
    if(boss.bombTmr>=boss.bombRate){
      boss.bombTmr=0;
      var cnt=boss.phase==="angry"?3:1;
      for(var bi=0;bi<cnt;bi++){
        bombs.push({x:boss.x+(Math.random()-0.5)*boss.w*0.6,
          y:boss.y+boss.h*0.45,
          vy:3.2+Math.random()*1.8+S.level*0.2,
          rot:0,rotSpd:(Math.random()-0.5)*0.2});
      }
    }
    if(S.panicTimer>=S.PANIC_FRAMES){exitPanic();return;}
  }

  for(var i=pBullets.length-1;i>=0;i--){
    var b=pBullets[i]; b.y+=b.vy*dt;
    if(b.y<-10){pBullets.splice(i,1);continue;}
    var hit=false;
    for(var ei=0;ei<enemies.length;ei++){
      var e=enemies[ei]; if(!e.alive) continue;
      if(Math.abs(b.x-e.x)<e.w/2+1&&Math.abs(b.y-e.y)<e.h/2+1){
        e.alive=false; hitFlash[ei]=22;
        S.score+=e.pts;
        burst(e.x,e.y,e.type==="bald"?"#44ff88":e.type==="curly"?"#ff44ff":"#ffcc00",10);
        killCount++;
        if(killCount>=KILLS_PER_DROP){ killCount=0; spawnPowerup(e.x,e.y); }
        pBullets.splice(i,1); hit=true; updateHUD(); break;
      }
    }
    if(hit) continue;
  }

  for(var i=eBullets.length-1;i>=0;i--){
    var b=eBullets[i]; b.y+=b.vy*dt;
    if(b.y>H+10){eBullets.splice(i,1);continue;}
    if(player.iframes<=0&&Math.abs(b.x-player.x)<player.w/2-3&&Math.abs(b.y-player.y)<player.h/2){
      eBullets.splice(i,1); loseLife(); if(S.mode==="gameover") return;
    }
  }

  for(var i=bombs.length-1;i>=0;i--){
    var b=bombs[i]; b.y+=b.vy*dt; b.rot+=b.rotSpd*dt;
    if(b.y>H+20){bombs.splice(i,1);continue;}
    if(player.iframes<=0&&Math.abs(b.x-player.x)<player.w/2+24&&Math.abs(b.y-player.y)<player.h/2+24){
      burst(b.x,b.y,"#886633",12); bombs.splice(i,1);
      loseLife(); if(S.mode==="gameover") return;
    }
  }

  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=0.94;p.vy*=0.94;p.life-=dt;
    if(p.life<=0) particles.splice(i,1);
  }
  // Update powerups
  for(var i=powerups.length-1;i>=0;i--){
    var pu=powerups[i];
    pu.y+=pu.vy*dt;
    pu.life-=dt;
    pu.angle+=0.025*dt;     // slow controlled spin
    pu.bobAngle+=0.06*dt;   // gentle bob
    if(pu.life<=0||pu.y>H+20){ powerups.splice(i,1); continue; }
    // Player collision
    if(player && Math.abs(pu.x-player.x)<22 && Math.abs(pu.y-player.y)<22){
      collectPowerup(pu);
      powerups.splice(i,1);
    }
  }
}

// ── Draw ──────────────────────────────────────────────────
function draw(){
  if(starBg) ctx.drawImage(starBg,0,0);
  else{ctx.fillStyle="#03030e";ctx.fillRect(0,0,W,H);}

  for(var si=0;si<starLayers3.length;si++){
    var st=starLayers3[si];
    ctx.globalAlpha=st.a*(S.mode==="panic"?0.5:1);
    // Near stars slightly warm, far stars cool blue
    if(S.mode==="panic")      ctx.fillStyle="#ffaaaa";
    else if(st.layer===2)      ctx.fillStyle="#fffde8";
    else if(st.layer===1)      ctx.fillStyle="#cce0ff";
    else                       ctx.fillStyle="#99bbee";
    ctx.fillRect(st.x,st.y,st.r*2,st.r*2);
  }
  ctx.globalAlpha=1;

  if(S.mode==="panic"){
    var frac=Math.min(1,S.panicTimer/S.PANIC_FRAMES);
    ctx.fillStyle="rgba(180,0,50,"+(frac*0.18)+")";
    ctx.fillRect(0,0,W,H);
  }

  if(S.mode==="play"||S.mode==="panic"){
    if(boss) drawBoss(boss);

    for(var ei=0;ei<enemies.length;ei++){
      var e=enemies[ei];
      if(e.alive){
        drawEnemy(e,ei);
      } else if(hitFlash[ei]>0){
        var scr=e.type==="bald"?I.baldScream:e.type==="curly"?I.curlyScream:I.darkScream;
        var dw=e.w*1.55,dh=e.h*1.9;
        ctx.save();ctx.translate(e.x,e.y);
        ctx.globalAlpha=hitFlash[ei]/22;
        ctx.rotate(hitFlash[ei]%2===0?0.25:-0.25);
        safeDrawImage(scr,-dw/2,-dh/2,dw,dh);
        ctx.globalAlpha=1;ctx.restore();
      }
    }

    for(var i=0;i<pBullets.length;i++) drawBullet(pBullets[i],false);
    for(var i=0;i<eBullets.length;i++) drawBullet(eBullets[i],true);
    for(var i=0;i<bombs.length;i++)    drawBomb(bombs[i]);

    for(var i=0;i<particles.length;i++){
      var p=particles[i];
      ctx.globalAlpha=p.life/p.max;
      ctx.fillStyle=p.color;
      var pr=p.r*(p.life/p.max);
      ctx.fillRect(p.x-pr,p.y-pr,pr*2,pr*2);
    }
    ctx.globalAlpha=1;

    // Draw power-ups (behind player)
    for(var i=0;i<powerups.length;i++) drawPowerup(powerups[i]);

    drawPlayer(player);

    // Shield ring around player
    if(shieldActive && player){
      var sp=Math.floor(Date.now()/80)%2===0;
      ctx.strokeStyle=sp?"#44aaff":"#aaddff";
      ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(player.x,player.y,player.w*0.9,0,Math.PI*2); ctx.stroke();
    }

    // Rapid fire indicator — pulse on player
    if(rapidFireActive && player){
      ctx.strokeStyle=(Math.floor(Date.now()/100)%2===0)?"#ffee00":"#ffaa00";
      ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(player.x,player.y,player.w*0.7,0,Math.PI*2); ctx.stroke();
    }

    ctx.strokeStyle="rgba(0,255,255,0.1)";ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,H-28);ctx.lineTo(W,H-28);ctx.stroke();

    if(S.mode==="play"&&S.playTimer>S.PLAY_FRAMES*0.72){
      var frac=(S.playTimer-S.PLAY_FRAMES*0.72)/(S.PLAY_FRAMES*0.28);
      if(Math.floor(Date.now()/220)%2===0){ctx.fillStyle="rgba(255,0,80,"+(frac*0.1)+")";ctx.fillRect(0,0,W,H);}
      ctx.fillStyle="rgba(255,30,80,"+(frac*0.85)+")";ctx.fillRect(0,0,W*frac,5);
    }

    if(S.mode==="panic"){
      var rem=1-S.panicTimer/S.PANIC_FRAMES;
      ctx.fillStyle="rgba(255,0,80,0.18)";ctx.fillRect(0,0,W,6);
      ctx.fillStyle="rgba(255,"+(Math.floor(rem*180))+",80,0.85)";ctx.fillRect(0,0,W*rem,6);
    }
  }
}

// ── Loop & Boot ───────────────────────────────────────────
var loopErrorLogged=false;
function loop(ts){
  try{
    update(ts);
    draw();
  }catch(err){
    if(!loopErrorLogged){ console.error("loop:",err); loopErrorLogged=true; }
  }
  requestAnimationFrame(loop);

function _b64buf(b64){
  var s=atob(b64), b=new Uint8Array(s.length);
  for(var i=0;i<s.length;i++) b[i]=s.charCodeAt(i);
  return b.buffer;
}

// Play a 0.1s silent buffer to unlock AudioContext on iOS
function _unlock(ctx){
  var buf = ctx.createBuffer(1, ctx.sampleRate*0.1, ctx.sampleRate);
  var src = ctx.createBufferSource();
  src.buffer = buf;
  src.connect(ctx.destination);
  src.start(0);
}

function _play(){
  if(!_ac||!_buf) return;
  if(_src){ try{_src.stop();}catch(e){} _src=null; }
  _src = _ac.createBufferSource();
  _src.buffer = _buf;
  _src.loop   = true;
  _src.connect(_gain);
  _src.start(0);
  _pending = false;
}

// Called synchronously on the START tap
function audioUnlock(){
  if(_ac) return;
  try{
    _ac   = new (window.AudioContext||window.webkitAudioContext)();
    _gain = _ac.createGain();
    _gain.gain.value = 0.55;
    _gain.connect(_ac.destination);
    // Unlock immediately with silent sound
    _unlock(_ac);
    if(_ac.state==="suspended") _ac.resume();
    // Now decode music async — context already unlocked so it will play
    _ac.decodeAudioData(_b64buf(_MUSIC), function(buf){
      _buf = buf;
      if(_pending) _play();
    }, function(e){ console.warn("decode failed:",e); });
  } catch(e){ console.warn("AudioContext failed:",e); }
}

function musicPlay(){
  bgmPlaying = true;
  if(_buf){ _play(); }
  else { _pending = true; } // will play when decode finishes
}

function musicStop(){
  bgmPlaying = false;
  _pending   = false;
  if(_src){ try{_src.stop();}catch(e){} _src=null; }
}

function musicPause(){
  if(_ac && _ac.state==="running") _ac.suspend();
}

function musicResume(){
  if(_ac && bgmPlaying) _ac.resume();
}

function toggleMute(){
  bgmMuted = !bgmMuted;
  if(_gain) _gain.gain.value = bgmMuted ? 0 : 0.55;
  var btn=document.getElementById("mute-btn");
  if(btn) btn.textContent = bgmMuted ? "\u266d" : "\u266a";
}

document.addEventListener("visibilitychange",function(){
  if(document.hidden){ musicPause(); }
  else if(bgmPlaying){ musicResume(); }
});

document.getElementById("btn-start").addEventListener("click", function(){
  audioUnlock(); // synchronously unlock audio context on tap
  startGame();   // musicPlay() inside will fire when buffer ready
});

// Draw logo onto overlay canvas once image loads
function drawLogo() {
  var lc = document.getElementById("logo-canvas");
  if (!lc) return;
  var img = I.logo;
  if (!img || !img._ready) { setTimeout(drawLogo, 50); return; }
  // Scale to fit width of overlay, preserve aspect
  var maxW = Math.min(window.innerWidth - 24, 360);
  var scale = maxW / img.naturalWidth;
  lc.width  = Math.round(img.naturalWidth  * scale);
  lc.height = Math.round(img.naturalHeight * scale);
  lc.style.width  = lc.width  + "px";
  lc.style.height = lc.height + "px";
  var lctx = lc.getContext("2d");
  lctx.clearRect(0,0,lc.width,lc.height);
  lctx.drawImage(img, 0, 0, lc.width, lc.height);
}
drawLogo();

requestAnimationFrame(loop);
</script>
